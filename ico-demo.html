<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ICO Demo - SVG embedded, PNG images</title>
  <style>
    :root { font-family: Arial, sans-serif; color-scheme: light; }
    body { margin: 0; padding: 0; }
    header { padding: 12px 16px; background: #222; color: #fff; }
    h1 { margin: 0; font-size: 18px; }
    main { padding: 16px; }
    h2 { margin: 20px 0 10px; font-size: 16px; color: #1f2937; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; align-items: start; }
    .tile { border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px; background: #fff; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .tile img { display: block; image-rendering: auto; }
    .tile img.svg-embed {
      height: 32px;
      width: auto;
      filter: brightness(0) saturate(100%);
    }
    .name { font-size: 11px; color: #374151; text-align: center; word-break: break-word; }
  </style>
</head>

    function addTile(container, src, label, isSvg) {
      const tile = document.createElement("div");
      tile.className = "tile";
      const img = document.createElement("img");
      img.src = src;
      img.alt = label;
      if (isSvg) {
        img.classList.add("svg-embed");
      }
      tile.appendChild(img);
      const text = document.createElement("div");
      text.className = "name";
      text.textContent = label;
      tile.appendChild(text);
      container.appendChild(tile);
    }

    const svgGrid = document.getElementById("svg-grid");
    embeddedSvgs.forEach((item) => addTile(svgGrid, item.src, item.name, true));

    const pngGrid = document.getElementById("png-grid");
    pngFiles.forEach((name) => addTile(pngGrid, name, name, false));
