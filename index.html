<head>
  <meta charset="UTF-8">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #e3e3e3;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e3e3e3;
      white-space: nowrap;
    }

    #search {
      flex: 1;
      min-width: 200px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e3e3e3;
      font-size: 13px;
      padding: 7px 12px;
      outline: none;
    }
    #search:focus { border-color: #555; }
    #search::placeholder { color: #666; }

    .filters {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #999;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: #555; color: #ccc; }
    .filter-btn.active { background: #2a2a2a; border-color: #555; color: #e3e3e3; }

    #count {
      font-size: 12px;
      color: #555;
      white-space: nowrap;
    }

    main {
      padding: 20px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 8px;
    }

    .icon-card {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px 8px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      position: relative;
      min-height: 88px;
    }
    .icon-card:hover { background: #222; border-color: #333; }
    .icon-card.copied { border-color: #4caf50; }

    .icon-card img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .icon-card .name {
      font-size: 10px;
      color: #666;
      text-align: center;
      line-height: 1.3;
      word-break: break-all;
      max-width: 100%;
    }

    .icon-card .badge {
      position: absolute;
      top: 5px;
      right: 5px;
      font-size: 9px;
      color: #444;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .icon-card .badge.png { color: #7a5;  }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #e3e3e3;
      font-size: 13px;
      padding: 9px 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #no-results {
      display: none;
      text-align: center;
      color: #444;
      font-size: 14px;
      padding: 60px 0;
    }
    #no-results.visible { display: block; }
  </style>
</head>
<body>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="svg">SVG</button>
    <button class="filter-btn" data-filter="png">PNG</button>
  </div>
  <span id="count"></span>
</header>

</main>

function displayName(filename) {
  return filename
    .replace(/_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24/, '')
    .replace(/\.[^.]+$/, '')
    .replace(/[-_]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function ext(filename) {
  return filename.split('.').pop().toLowerCase();
}

let currentFilter = 'all';
let currentSearch = '';
let toastTimer;

function filteredIcons() {
  return icons.filter(name => {
    const matchesFilter = currentFilter === 'all' || ext(name) === currentFilter;
    const matchesSearch = !currentSearch || displayName(name).toLowerCase().includes(currentSearch) || name.toLowerCase().includes(currentSearch);
    return matchesFilter && matchesSearch;
  });
}

function render() {
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('no-results');
  const list = filteredIcons();

  document.getElementById('count').textContent = `${list.length} of ${icons.length}`;

  if (list.length === 0) {
    grid.innerHTML = '';
    noResults.classList.add('visible');
    return;
  }
  noResults.classList.remove('visible');

  grid.innerHTML = list.map(name => {
    const format = ext(name);
    const label = displayName(name);
    const src = encodeURIComponent(name).replace(/%20/g, '%20');
    return `<div class="icon-card" title="${name}" data-name="${name}" onclick="copyName(this, '${name.replace(/'/g, "\\'")}')">
      <span class="badge ${format}">${format.toUpperCase()}</span>
      <img src="${src}" alt="${label}" loading="lazy">
      <span class="name">${label}</span>
    </div>`;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function copyName(card, name) {
  navigator.clipboard.writeText(name).then(() => {
    card.classList.add('copied');
    setTimeout(() => card.classList.remove('copied'), 1000);
    showToast(`Copied: ${name}`);
  });
}

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase().trim();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

render();
